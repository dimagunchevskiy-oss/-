<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telegram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --blue:#2AABEE;--blue-d:#1a9fe0;--blue-l:#e8f4fd;--blue-ll:#d4ecfa;
  --bg:#fff;--surface:#f4f4f5;--border:#e4e4e7;
  --text:#0d0d0d;--t2:#6b7280;--t3:#9ca3af;
  --out:#effdde;--in:#fff;
  --green:#22c55e;--red:#ef4444;
  --chat-bg:#efeae2;
  --hh:56px;--fh:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;color:var(--text);position:fixed;inset:0;background:var(--bg)}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
#loader svg{width:70px;height:70px;animation:spin 1.4s linear infinite}
#loader p{color:rgba(255,255,255,.85);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .27s cubic-bezier(.4,0,.2,1),opacity .27s;will-change:transform}
.screen.hidden{transform:translateX(100%);pointer-events:none;opacity:.3}
.screen.back-hidden{transform:translateX(-28%);pointer-events:none;opacity:.5}

/* ── AUTH ── */
#s-auth{background:linear-gradient(155deg,#0f7fc2 0%,#2AABEE 55%,#58ccf5 100%);justify-content:flex-end;align-items:center}
.auth-hero{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding-top:max(55px,8vh);animation:fadeD .6s ease both}
.auth-logo{width:88px;height:88px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.28)}
.auth-logo svg{width:52px;height:52px}
.auth-hero h1{color:#fff;font-size:30px;font-weight:700;letter-spacing:-.5px}
.auth-hero p{color:rgba(255,255,255,.78);font-size:13px;margin-top:5px}
.auth-card{background:#fff;border-radius:24px 24px 0 0;padding:26px 22px max(40px,env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideU .42s ease both .08s;box-shadow:0 -10px 50px rgba(0,0,0,.13);overflow-y:auto;max-height:75vh}
.atabs{display:flex;background:var(--surface);border-radius:12px;padding:3px;margin-bottom:20px}
.atab{flex:1;padding:9px;border:none;background:transparent;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s}
.atab.on{background:#fff;color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.09)}
.aform{display:flex;flex-direction:column;gap:12px}
.aform.h{display:none}
.ig label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.ig input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;transition:all .2s;background:var(--bg)}
.ig input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,171,238,.12)}
.ig input::placeholder{color:var(--t3)}
.btn{padding:13px;background:var(--blue);color:#fff;border:none;border-radius:13px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:2px}
.btn:active{transform:scale(.97);background:var(--blue-d)}
.btn.ghost{background:var(--surface);color:var(--t2)}
.btn.danger{background:#fee2e2;color:var(--red)}
.aerr{font-size:12px;color:var(--red);text-align:center;min-height:15px;font-weight:500}

/* ── HEADER ── */
.hdr{height:var(--hh);background:var(--blue);display:flex;align-items:center;padding:0 6px 0 2px;gap:2px;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.18);z-index:10}
.hbtn{width:44px;height:44px;background:none;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;transition:background .15s}
.hbtn:active{background:rgba(255,255,255,.22)}
.hbtn svg{width:22px;height:22px}
.htitle{flex:1;font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.htitle.sm{font-size:15px;font-weight:600;line-height:1.2}
.hsub{font-size:12px;color:rgba(255,255,255,.75);margin-top:1px}
.hinfo{flex:1;min-width:0}
.hav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;margin-right:8px;overflow:hidden;cursor:pointer}
.hav img{width:100%;height:100%;object-fit:cover}

/* ── SEARCH BAR ── */
.sbar{padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.swrap{position:relative}
.swrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--t3);pointer-events:none}
.swrap input{width:100%;padding:8px 14px 8px 34px;background:var(--surface);border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none}
.swrap input::placeholder{color:var(--t3)}

/* ── CHAT LIST ── */
#s-list .body{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;padding:9px 14px;gap:11px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.ci:active{background:var(--surface)}
.av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;position:relative}
.av.sm{width:40px;height:40px;font-size:15px}
.av.xs{width:30px;height:30px;font-size:11px}
.av img{width:100%;height:100%;object-fit:cover}
.odot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;background:var(--green);border-radius:50%;border:2.5px solid #fff}
.cinfo{flex:1;min-width:0}
.crow{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.cname{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:12px;color:var(--t2);flex-shrink:0}
.cprev{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.you{color:var(--blue);font-weight:500}
.ubadge{background:var(--blue);color:#fff;border-radius:12px;font-size:11px;font-weight:700;padding:2px 7px;min-width:20px;text-align:center;flex-shrink:0}

/* ── FAB ── */
.fab{position:absolute;bottom:18px;right:16px;width:56px;height:56px;background:var(--blue);border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(42,171,238,.48);z-index:20;color:#fff;transition:all .15s}
.fab:active{transform:scale(.92);background:var(--blue-d)}
.fab svg{width:26px;height:26px}

/* ── MESSAGES ── */
#s-chat .body{flex:1;overflow-y:auto;padding:10px 8px 6px;display:flex;flex-direction:column;gap:2px;background:var(--chat-bg) url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.4' fill='%232aabee' fill-opacity='.07'/%3E%3C/svg%3E")}
.ddiv{align-self:center;background:rgba(0,0,0,.27);color:#fff;font-size:12px;font-weight:500;padding:4px 12px;border-radius:12px;margin:6px 0;pointer-events:none}
.mw{display:flex;flex-direction:column;max-width:78%;animation:msgA .18s ease both;position:relative;cursor:pointer}
.mw.out{align-self:flex-end;align-items:flex-end}
.mw.in{align-self:flex-start;align-items:flex-start}
.msender{font-size:12px;font-weight:600;margin-bottom:3px;padding:0 4px}
.mb{padding:7px 11px 5px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.1);position:relative;user-select:text}
.mw.out .mb{background:var(--out);border-bottom-right-radius:4px}
.mw.in .mb{background:var(--in);border-bottom-left-radius:4px}
.mw.deleted .mb{color:var(--t2);font-style:italic}
.rq{border-left:3px solid var(--blue);padding-left:9px;margin-bottom:5px;cursor:pointer}
.rqname{font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.rqtext{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.mmeta{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--t3);margin-top:2px;padding:0 3px}
.mw.out .mmeta{justify-content:flex-end}
.edited{font-size:10px;color:var(--t3);font-style:italic}
.chk{width:16px;height:16px;color:var(--blue)}
.chk.g{color:var(--t3)}

/* ── MSG IMAGE ── */
.mimg{max-width:220px;border-radius:12px;margin-bottom:4px;display:block;cursor:pointer}

/* ── CONTEXT MENU ── */
.ctxmenu{position:fixed;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:500;padding:6px 0;min-width:180px;animation:ctxA .15s ease;overflow:hidden}
.cxi{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text);transition:background .12s}
.cxi:active,.cxi:hover{background:var(--surface)}
.cxi.red{color:var(--red)}
.cxi svg{width:19px;height:19px;flex-shrink:0}
.ctx-overlay{position:fixed;inset:0;z-index:499;display:none}
.ctx-overlay.on{display:block}

/* ── REACTION BAR ── */
.react-bar{position:fixed;background:#fff;border-radius:99px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:498;padding:6px 10px;display:flex;gap:6px;animation:ctxA .15s ease}
.react-btn{font-size:22px;cursor:pointer;transition:transform .15s;border:none;background:none;padding:2px}
.react-btn:active{transform:scale(1.3)}

/* ── REACTIONS ── */
.reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;padding:0 3px}
.rxn{background:rgba(42,171,238,.12);border-radius:99px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;border:1px solid transparent;transition:all .15s}
.rxn.mine{background:var(--blue-ll);border-color:var(--blue)}
.rxn span{font-size:11px;font-weight:600;color:var(--t2)}

/* ── BARS ── */
.bar{display:none;align-items:center;padding:8px 12px;background:var(--bg);gap:10px;flex-shrink:0;border-top:1px solid var(--border)}
.bar.on{display:flex}
.barline{width:3px;background:var(--blue);border-radius:2px;align-self:stretch;flex-shrink:0}
.barinfo{flex:1;min-width:0}
.barname{font-size:12px;font-weight:700;color:var(--blue)}
.bartext{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barclose{width:28px;height:28px;border:none;background:none;color:var(--t3);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.editbar{background:#fffde7;border-top-color:#ffe082}
.editbar .barname{color:#f59e0b}

/* ── FOOTER ── */
.cfooter{min-height:var(--fh);background:var(--bg);display:flex;align-items:flex-end;padding:8px 8px 8px 10px;gap:7px;flex-shrink:0;border-top:1px solid var(--border)}
.inpwrap{flex:1;background:var(--surface);border-radius:22px;display:flex;align-items:flex-end;padding:6px 10px 6px 14px;border:1.5px solid transparent;transition:border-color .2s}
.inpwrap:focus-within{border-color:var(--blue)}
.msginp{flex:1;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;resize:none;max-height:110px;line-height:1.5;padding:2px 0}
.msginp::placeholder{color:var(--t3)}
.sendbtn{width:44px;height:44px;background:var(--blue);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;box-shadow:0 2px 10px rgba(42,171,238,.4);transition:all .15s}
.sendbtn:active{transform:scale(.9);background:var(--blue-d)}
.sendbtn svg{width:20px;height:20px}
.attachbtn{width:36px;height:36px;border:none;background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;transition:color .15s}
.attachbtn:active{color:var(--blue)}
.attachbtn svg{width:23px;height:23px}

/* ── TYPING ── */
.typingbar{display:none;align-items:center;gap:8px;padding:4px 14px;font-size:12px;color:var(--t2);font-style:italic;flex-shrink:0}
.typingbar.on{display:flex}
.tdots span{display:inline-block;width:5px;height:5px;background:var(--t3);border-radius:50%;animation:tdot 1.2s infinite;margin:0 1px}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}

/* ── SETTINGS ── */
#s-sett .body{flex:1;overflow-y:auto}
.sprof{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;background:linear-gradient(180deg,var(--blue-ll) 0%,#fff 100%);border-bottom:1px solid var(--border);gap:7px}
.sav{width:84px;height:84px;border-radius:50%;font-size:30px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.14);overflow:hidden;cursor:pointer;position:relative}
.sav img{width:100%;height:100%;object-fit:cover}
.savov{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:0;transition:opacity .2s}
.sav:hover .savov{opacity:1}
.savov svg{width:26px;height:26px;color:#fff}
.sname{font-size:20px;font-weight:700}
.sun{font-size:13px;color:var(--t2)}
.ssec{padding:16px 14px 6px}
.ssectitle{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;padding:0 3px}
.scard{background:var(--bg);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.srow{display:flex;align-items:center;padding:13px 14px;gap:11px;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.sicon{width:34px;height:34px;background:var(--blue-l);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sicon svg{width:17px;height:17px;color:var(--blue)}
.sbody{flex:1;min-width:0}
.slabel{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.sval{font-size:15px;color:var(--t2);margin-top:2px}
.sinp{width:100%;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;margin-top:2px}

/* ── MODAL ── */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.mover.on{opacity:1;pointer-events:all}
.msheet{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:14px;max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mover.on .msheet{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.mtitle{font-size:17px;font-weight:700;margin-bottom:12px}
.mresults{flex:1;overflow-y:auto}
.urow{display:flex;align-items:center;gap:11px;padding:9px 4px;cursor:pointer;border-bottom:1px solid var(--border);border-radius:10px;transition:background .12s}
.urow:active{background:var(--surface)}
.urinfo{flex:1}
.urname{font-size:15px;font-weight:600}
.urun{font-size:13px;color:var(--t2)}
.urchk{width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.urchk svg{width:14px;height:14px;color:#fff}
.mfooter{padding-top:10px;border-top:1px solid var(--border);margin-top:6px}

/* ── NEW CHAT TABS ── */
.nctabs{display:flex;gap:8px;margin-bottom:12px}
.nctab{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.nctab svg{width:16px;height:16px}
.nctab.on{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.grpsetup{display:none;margin-bottom:10px}
.grpsetup.on{display:block}
.ginp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:9px;transition:border-color .2s}
.ginp:focus{border-color:var(--blue)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{display:flex;align-items:center;gap:4px;background:var(--blue-l);border-radius:20px;padding:3px 8px 3px 4px;font-size:13px;font-weight:600;color:var(--blue)}
.chipx{background:none;border:none;color:var(--t2);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}

/* ── IMAGE VIEWER ── */
#imgview{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:none;align-items:center;justify-content:center}
#imgview.on{display:flex}
#imgview img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain}
#imgview-close{position:absolute;top:16px;right:16px;width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:50%;border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(0,0,0,.8);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none;max-width:85vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:var(--t2);padding:24px;text-align:center}
.empty svg{width:58px;height:58px;opacity:.22}
.empty p{font-size:13px;line-height:1.6}

/* ── GROUP BAR ── */
.gbar{padding:5px 14px;background:var(--blue-l);font-size:12px;color:var(--blue);font-weight:500;border-bottom:1px solid var(--blue-ll);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── ANIMATIONS ── */
@keyframes fadeD{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideU{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgA{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes ctxA{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 12a10 10 0 1 1-5.93-9.14" opacity=".3"/>
    <path d="M22 12a10 10 0 0 0-5.93-9.14"/>
  </svg>
  <p>Подключение…</p>
</div>

<!-- ══ AUTH ══ -->
<div id="s-auth" class="screen hidden">
  <div class="auth-hero">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Telegram</h1>
    <p>Быстро. Безопасно. Надёжно.</p>
  </div>
  <div class="auth-card">
    <div class="atabs">
      <button class="atab on" onclick="authTab('in')">Войти</button>
      <button class="atab" onclick="authTab('up')">Регистрация</button>
    </div>

const app = initializeApp(firebaseConfig);

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
const COLORS=['#E91E63','#9C27B0','#3F51B5','#2196F3','#009688','#4CAF50','#FF9800','#FF5722','#795548','#00BCD4'];
const rcolor=()=>COLORS[Math.floor(Math.random()*COLORS.length)];
const init=n=>n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtTime=ts=>{if(!ts)return'';const d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});const df=n-d;if(df<172800000)return'Вчера';return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})};
const fmtDate=ts=>new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
const fmtFull=ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

function avHtmlUser(u,cls=''){
  if(!u)return`<div class="av ${cls}" style="background:#999">?</div>`;
  if(u.avatar)return`<div class="av ${cls}"><img src="${u.avatar}" alt="" onerror="this.parentNode.innerHTML='${init(u.name)}'"></div>`;
  return`<div class="av ${cls}" style="background:${u.color||'#2196F3'}">${init(u.name)}</div>`;
}
function avHtmlChat(chat,users,me,cls=''){
  if(!chat)return`<div class="av ${cls}" style="background:#999">?</div>`;
  if(chat.type==='group'){
    if(chat.avatar)return`<div class="av ${cls}"><img src="${chat.avatar}" alt=""></div>`;
    return`<div class="av ${cls}" style="background:${chat.color||'#2196F3'}">${init(chat.name)}</div>`;
  }
  const oth=chat.members?Object.keys(chat.members).find(m=>m!==me):null;
  const u=oth&&users?users[oth]:null;
  return avHtmlUser(u,cls);
}
function getChatName(chat,users,me){
  if(!chat)return'?';
  if(chat.type==='group')return chat.name||'Группа';
  const oth=chat.members?Object.keys(chat.members).find(m=>m!==me):null;
  return users&&oth&&users[oth]?users[oth].name:'Удалённый аккаунт';
}
function isOnline(u){
  if(!u)return false;
  if(u.online)return true;
  return false;
}

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let ME=null, ALL_USERS={}, ALL_CHATS={};
let curChatId=null;
let replyTo=null, editMsgId=null;
let grpMode='dm', grpSelected=[];
let screenStack=[];
let msgsListeners={};

// ════════════════════════════════════════════
// SCREEN NAV
// ════════════════════════════════════════════
function showScreen(id){
  const prev=screenStack[screenStack.length-1];
  if(prev&&prev!==id){
    const pe=document.getElementById(prev);
    pe?.classList.add('back-hidden');
    pe?.classList.remove('hidden');
  }
  screenStack.push(id);
  document.querySelectorAll('.screen').forEach(s=>{if(s.id!==id&&s.id!==prev)s.classList.add('hidden');s.classList.remove('back-hidden')});
  const el=document.getElementById(id);
  el.classList.remove('hidden','back-hidden');
}
window.goBack=function(){
  screenStack.pop();
  const prev=screenStack[screenStack.length-1]||'s-list';
  document.querySelectorAll('.screen').forEach(s=>{s.classList.add('hidden');s.classList.remove('back-hidden')});
  document.getElementById(prev)?.classList.remove('hidden');
  if(prev==='s-list')renderChatList();
};

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
window.authTab=function(tab){
  document.querySelectorAll('.atab').forEach((t,i)=>t.classList.toggle('on',(i===0)===(tab==='in')));
  document.getElementById('f-in').classList.toggle('h',tab!=='in');
  document.getElementById('f-up').classList.toggle('h',tab!=='up');
  document.getElementById('l-err').textContent='';
  document.getElementById('r-err').textContent='';
};

window.doLogin=async function(){
  const un=document.getElementById('li-un').value.trim().replace('@','').toLowerCase();
  const pw=document.getElementById('li-pw').value;
  const err=document.getElementById('l-err');
  err.textContent='';
  if(!un||!pw){err.textContent='Заполните все поля';return}
  try{
    const snap=await get(ref(db,'users/'+un));
    if(!snap.exists()){err.textContent='Пользователь не найден';return}
    const u=snap.val();
    if(u.pw!==pw){err.textContent='Неверный пароль';return}
    ME=un;
    localStorage.setItem('tgx_sess',un);
    await update(ref(db,'users/'+un),{online:true,lastSeen:Date.now()});
    enterApp();
  }catch(e){err.textContent='Ошибка: '+e.message}
};

window.doRegister=async function(){
  const name=document.getElementById('ru-name').value.trim();
  const un=document.getElementById('ru-un').value.trim().replace('@','').toLowerCase();
  const pw=document.getElementById('ru-pw').value;
  const err=document.getElementById('r-err');
  err.textContent='';
  if(!name||!un||!pw){err.textContent='Заполните все поля';return}
  if(un.length<3){err.textContent='Минимум 3 символа';return}
  if(!/^[a-z0-9_]+$/.test(un)){err.textContent='Только a-z, 0-9, _';return}
  if(pw.length<6){err.textContent='Пароль минимум 6 символов';return}
  try{
    const snap=await get(ref(db,'users/'+un));
    if(snap.exists()){err.textContent='Это имя пользователя занято';return}
    const userData={name,username:un,pw,color:rcolor(),avatar:null,bio:'',online:true,lastSeen:Date.now(),createdAt:Date.now()};
    await set(ref(db,'users/'+un),userData);
    ME=un;
    localStorage.setItem('tgx_sess',un);
    enterApp();
  }catch(e){err.textContent='Ошибка: '+e.message}
};

window.doLogout=async function(){
  if(ME)await update(ref(db,'users/'+ME),{online:false,lastSeen:Date.now()});
  localStorage.removeItem('tgx_sess');
  ME=null;curChatId=null;screenStack=[];ALL_USERS={};ALL_CHATS={};
  // unsubscribe all
  Object.values(msgsListeners).forEach(fn=>fn());
  msgsListeners={};
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById('s-auth').classList.remove('hidden');
  screenStack=['s-auth'];
};

// ════════════════════════════════════════════
// ENTER APP
// ════════════════════════════════════════════
function enterApp(){
  screenStack=['s-list'];
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById('s-list').classList.remove('hidden');
  subscribeUsers();
  subscribeChats();
  heartbeat();
}

function heartbeat(){
  if(!ME)return;
  update(ref(db,'users/'+ME),{online:true,lastSeen:Date.now()});
  setTimeout(heartbeat,30000);
}
window.addEventListener('beforeunload',()=>{
  if(ME)update(ref(db,'users/'+ME),{online:false,lastSeen:Date.now()});
});
document.addEventListener('visibilitychange',()=>{
  if(!ME)return;
  if(document.hidden)update(ref(db,'users/'+ME),{online:false,lastSeen:Date.now()});

function subscribeChats(){

function subscribeMessages(chatId){

}

// CHAT LIST
// ════════════════════════════════════════════
function renderChatList(filter=''){
  const body=document.getElementById('list-body');
  // Get chats I'm member of
  let myChats=Object.values(ALL_CHATS).filter(c=>c.members&&c.members[ME]);
  if(filter){
    const q=filter.toLowerCase();
    myChats=myChats.filter(c=>{
      const n=getChatName(c,ALL_USERS,ME).toLowerCase();
      return n.includes(q)||(c.type==='dm'&&Object.keys(c.members||{}).some(m=>m!==ME&&m.includes(q)));
    });
  }
  // Sort by lastMsgTime
  myChats.sort((a,b)=>(b.lastMsgTime||0)-(a.lastMsgTime||0));

  if(!myChats.length){
    body.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>${filter?'Ничего не найдено':'Нет чатов.\nНажмите ✏️ чтобы начать новый.'}</p></div>`;
    return;
  }

  body.innerHTML=myChats.map(chat=>{
    const name=esc(getChatName(chat,ALL_USERS,ME));
    const time=fmtTime(chat.lastMsgTime);
    const lastTxt=chat.lastMsg||'';
    const isMe=chat.lastMsgFrom===ME;
    const isGroup=chat.type==='group';
    let senderLabel='';
    if(isGroup&&chat.lastMsgFrom){
      const su=ALL_USERS[chat.lastMsgFrom];
      senderLabel=su?(isMe?'<span class="you">Вы: </span>':`<span style="color:var(--blue)">${esc(su.name.split(' ')[0])}: </span>`):'';
    }else if(isMe){senderLabel='<span class="you">Вы: </span>'}

    // Online dot for DM
    let dotHtml='';
    if(chat.type==='dm'){
      const oth=Object.keys(chat.members||{}).find(m=>m!==ME);
      if(oth&&ALL_USERS[oth]?.online)dotHtml='<div class="odot"></div>';
    }

    const avEl=avHtmlForListChat(chat,dotHtml);
    return`<div class="ci" onclick="openChat('${chat.id}')">
      ${avEl}
      <div class="cinfo">
        <div class="crow"><span class="cname">${name}</span><span class="ctime">${time}</span></div>
        <div class="cprev">${senderLabel}${esc(lastTxt).slice(0,60)||'<em style="color:#bbb">Нет сообщений</em>'}</div>
      </div>
    </div>`;
  }).join('');
}

function avHtmlForListChat(chat,dotHtml=''){
  const cls='';
  if(chat.type==='group'){
    const inner=chat.avatar?`<img src="${chat.avatar}" alt="">`:`<span>${init(chat.name||'G')}</span>`;
    return`<div class="av" style="${chat.avatar?'':'background:'+((chat.color||'#2196F3'))}">${inner}${dotHtml}</div>`;
  }
  const oth=Object.keys(chat.members||{}).find(m=>m!==ME);
  const u=oth?ALL_USERS[oth]:null;
  if(!u)return`<div class="av" style="background:#999">?</div>`;
  if(u.avatar)return`<div class="av"><img src="${u.avatar}" alt="">${dotHtml}</div>`;
  return`<div class="av" style="background:${u.color||'#2196F3'}">${init(u.name)}${dotHtml}</div>`;
}

window.filterChatList=function(v){renderChatList(v)};

function updateChatHeader(){
  const chat=ALL_CHATS[curChatId];
  if(!chat)return;
  const avEl=document.getElementById('ch-av');
  if(chat.type==='group'){
    if(chat.avatar){avEl.innerHTML=`<img src="${chat.avatar}" alt="">`;avEl.style.background='transparent';}
    else{avEl.innerHTML=init(chat.name||'G');avEl.style.background=chat.color||'#2196F3';}
    document.getElementById('ch-name').textContent=chat.name||'Группа';
    const online=Object.keys(chat.members||{}).filter(m=>m!==ME&&ALL_USERS[m]?.online).length;
    document.getElementById('ch-status').textContent=`${Object.keys(chat.members||{}).length} участников${online?', '+online+' в сети':''}`;
    document.getElementById('gbar').style.display='block';
    document.getElementById('gbar').textContent='Участники: '+Object.keys(chat.members||{}).map(m=>ALL_USERS[m]?.name||m).join(', ');
  }else{
    document.getElementById('gbar').style.display='none';
    const oth=Object.keys(chat.members||{}).find(m=>m!==ME);
    const u=oth?ALL_USERS[oth]:null;
    if(u){
      if(u.avatar){avEl.innerHTML=`<img src="${u.avatar}" alt="">`;avEl.style.background='transparent';}
      else{avEl.innerHTML=init(u.name);avEl.style.background=u.color||'#2196F3';}
      document.getElementById('ch-name').textContent=u.name;
      if(u.online){document.getElementById('ch-status').textContent='в сети';}
      else if(u.lastSeen){
        const df=Date.now()-u.lastSeen;
        if(df<60000)document.getElementById('ch-status').textContent='был(а) только что';
        else if(df<3600000)document.getElementById('ch-status').textContent=`был(а) ${Math.floor(df/60000)} мин. назад`;
        else document.getElementById('ch-status').textContent=`был(а) ${new Date(u.lastSeen).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}`;
      }
    }
  }
}

// ════════════════════════════════════════════
// RENDER MESSAGES
// ════════════════════════════════════════════
function renderMessages(msgsObj){
  const body=document.getElementById('msgs-body');
  const wasAtBottom=body.scrollHeight-body.scrollTop-body.clientHeight<60;
  const msgs=Object.values(msgsObj||{}).sort((a,b)=>a.ts-b.ts);
  const chat=ALL_CHATS[curChatId];
  if(!msgs.length){
    body.innerHTML=`<div class="empty" style="background:transparent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Напишите первым!</p></div>`;
    return;
  }
  let html='',lastDate='';
  const msgsMap={};
  msgs.forEach(m=>{msgsMap[m.id]=m});

  msgs.forEach(msg=>{
    const d=fmtDate(msg.ts);
    if(d!==lastDate){html+=`<div class="ddiv">${d}</div>`;lastDate=d;}
    const isOut=msg.from===ME;
    const isGroup=chat?.type==='group';
    const sender=ALL_USERS[msg.from];
    const t=fmtFull(msg.ts);
    const isDeleted=msg.deleted;

    let senderHtml='';
    if(!isOut&&isGroup&&!isDeleted){
      senderHtml=`<div class="msender" style="color:${sender?.color||'var(--blue)'}">${esc(sender?.name||msg.from)}</div>`;
    }

    // Reply quote
    let rqHtml='';
    if(msg.replyTo&&!isDeleted){
      const orig=msgsMap[msg.replyTo];
      if(orig){
        const rs=ALL_USERS[orig.from];
        rqHtml=`<div class="rq" onclick="scrollToMsg('${orig.id}')"><div class="rqname">${esc(rs?.name||orig.from)}</div><div class="rqtext">${esc((orig.text||'[медиа]').slice(0,60))}</div></div>`;
      }
    }

    // Image
    let imgHtml='';
    if(msg.image&&!isDeleted){
      imgHtml=`<img class="mimg" src="${msg.image}" alt="фото" onclick="viewImg('${msg.image}');event.stopPropagation()">`;
    }

    // Reactions
    let rxnHtml='';
    if(msg.reactions&&!isDeleted){
      const rxnMap={};
      Object.entries(msg.reactions).forEach(([uid,emoji])=>{
        if(!rxnMap[emoji])rxnMap[emoji]={count:0,mine:false};
        rxnMap[emoji].count++;
        if(uid===ME)rxnMap[emoji].mine=true;
      });
      rxnHtml='<div class="reactions">'+Object.entries(rxnMap).map(([em,{count,mine}])=>
        `<div class="rxn${mine?' mine':''}" onclick="toggleReaction('${msg.id}','${em}');event.stopPropagation()">${em}<span>${count}</span></div>`
      ).join('')+'</div>';
    }

    // Check marks
    let chkHtml='';
    if(isOut&&!isDeleted)chkHtml=`<svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    const editedHtml=msg.edited&&!isDeleted?`<span class="edited">ред.</span>`:'';
    const delStyle=isDeleted?'color:var(--t2);font-style:italic':'';

    html+=`<div class="mw ${isOut?'out':'in'}${isDeleted?' deleted':''}" data-id="${msg.id}" onclick="handleMsgTap(event,'${msg.id}',${isOut})">
      ${senderHtml}
      <div class="mb" style="${delStyle}">
        ${rqHtml}
        ${imgHtml}
        ${isDeleted?'🚫 Сообщение удалено':esc(msg.text||'')}
      </div>
      ${rxnHtml}
      <div class="mmeta">${editedHtml}<span>${t}</span>${chkHtml}</div>
    </div>`;
  });
  body.innerHTML=html;
  if(wasAtBottom)scrollMsgs();
}

function scrollMsgs(){const b=document.getElementById('msgs-body');b.scrollTop=b.scrollHeight}
window.scrollToMsg=function(msgId){
  const el=document.querySelector(`.mw[data-id="${msgId}"]`);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(42,171,238,.15)';setTimeout(()=>el.style.background='',1500)}
};

window.handleMsgTap=function(e,msgId,isOut){
  if(e.target.classList.contains('mimg')||e.target.classList.contains('rq')||e.target.closest('.rxn'))return;

function showCtxMenu(e,msgId,isOut){
  dismissCtx();
  e.preventDefault();e.stopPropagation();

  const EMOJIS=['👍','❤️','😂','😮','😢','🔥'];
  const reactionBar=document.createElement('div');
  reactionBar.className='react-bar';
  reactionBar.innerHTML=EMOJIS.map(em=>`<button class="react-btn" onclick="toggleReaction('${msgId}','${em}');dismissCtx()">${em}</button>`).join('');

  const menu=document.createElement('div');
  menu.className='ctxmenu';
  let items=`<div class="cxi" onclick="startReply('${msgId}');dismissCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>Ответить</div>`;
  items+=`<div class="cxi" onclick="copyMsgText('${msgId}');dismissCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Копировать</div>`;
  if(isOut){
    items+=`<div class="cxi" onclick="startEdit('${msgId}');dismissCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>Редактировать</div>`;
    items+=`<div class="cxi red" onclick="deleteMsgFn('${msgId}');dismissCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Удалить</div>`;
  }
  menu.innerHTML=items;

  // Position
  const wrap=document.querySelector(`.mw[data-id="${msgId}"]`);
  const rect=wrap?wrap.getBoundingClientRect():null;
  document.body.appendChild(reactionBar);
  document.body.appendChild(menu);

  if(rect){
    const rb=reactionBar;
    let rTop=rect.top-52;
    if(rTop<10)rTop=rect.bottom+4;
    rb.style.top=rTop+'px';
    if(isOut){rb.style.right=(window.innerWidth-rect.right)+'px';}
    else{rb.style.left=rect.left+'px';}

    let mTop=rect.bottom+4;
    if(mTop+250>window.innerHeight)mTop=rect.top-260;
    if(mTop<10)mTop=10;
    menu.style.top=mTop+'px';
    if(isOut){menu.style.right=(window.innerWidth-rect.right)+'px';}
    else{menu.style.left=rect.left+'px';}
  }else{
    reactionBar.style.top='40%';reactionBar.style.left='50%';reactionBar.style.transform='translateX(-50%)';
    menu.style.top='50%';menu.style.left='50%';menu.style.transform='translate(-50%,-50%)';
  }

  document.getElementById('ctx-ov').classList.add('on');
  ctxActive={reactionBar,menu};
}

window.dismissCtx=function(){
  if(ctxActive){ctxActive.reactionBar?.remove();ctxActive.menu?.remove();ctxActive=null}
  document.getElementById('ctx-ov').classList.remove('on');
};

window.toggleReaction=async function(msgId,emoji){
  if(!curChatId)return;
  const snap=await get(ref(db,`messages/${curChatId}/${msgId}/reactions/${ME}`));
  if(snap.exists()&&snap.val()===emoji){
    await remove(ref(db,`messages/${curChatId}/${msgId}/reactions/${ME}`));
  }else{
    await set(ref(db,`messages/${curChatId}/${msgId}/reactions/${ME}`),emoji);
  }
};

window.copyMsgText=async function(msgId){
  const snap=await get(ref(db,`messages/${curChatId}/${msgId}`));

window.startEdit=async function(msgId){

window.deleteMsgFn=async function(msgId){
  if(!curChatId)return;
  await update(ref(db,`messages/${curChatId}/${msgId}`),{deleted:true,text:'Сообщение удалено'});
  // Update lastMsg if needed
  const snap=await get(ref(db,`messages/${curChatId}`));
  const msgs=snap.val()||{};
  const sorted=Object.values(msgs).filter(m=>!m.deleted).sort((a,b)=>b.ts-a.ts);
  if(sorted.length>0){
    await update(ref(db,'chats/'+curChatId),{lastMsg:sorted[0].text||'[медиа]',lastMsgFrom:sorted[0].from,lastMsgTime:sorted[0].ts});
  }
};

// SEND MESSAGE
// ════════════════════════════════════════════
window.sendMessage=async function(){
  const inp=document.getElementById('msg-inp');
  const text=inp.value.trim();
  if((!text&&!editMsgId)||!curChatId)return;
  inp.value='';inp.style.height='';

  // Stop typing indicator
  if(curChatId&&ME)await update(ref(db,`chats/${curChatId}/typing/${ME}`),{typing:false});

  if(editMsgId){
    await update(ref(db,`messages/${curChatId}/${editMsgId}`),{text,edited:true,editedAt:Date.now()});
    await update(ref(db,'chats/'+curChatId),{lastMsg:text,lastMsgFrom:ME,lastMsgTime:Date.now()});
    cancelEdit();return;
  }

  const msgData={id:'',from:ME,text,ts:Date.now(),replyTo:replyTo?replyTo.msgId:null,edited:false,deleted:false};
  const newRef=push(ref(db,'messages/'+curChatId));
  msgData.id=newRef.key;
  await set(newRef,msgData);
  await update(ref(db,'chats/'+curChatId),{lastMsg:text,lastMsgFrom:ME,lastMsgTime:Date.now()});
  cancelReply();
  scrollMsgs();
};

window.sendImage=async function(input){

  if(!file||!curChatId)return;
  input.value='';
  showToast('Отправка изображения…');
  const reader=new FileReader();
  reader.onload=async e=>{
    const dataUrl=e.target.result;
    // Store image in DB (base64) - for small images; for large use Storage
    const msgData={id:'',from:ME,text:'',image:dataUrl,ts:Date.now(),replyTo:replyTo?replyTo.msgId:null,edited:false,deleted:false};
    const newRef=push(ref(db,'messages/'+curChatId));
    msgData.id=newRef.key;
    await set(newRef,msgData);
    await update(ref(db,'chats/'+curChatId),{lastMsg:'📷 Фото',lastMsgFrom:ME,lastMsgTime:Date.now()});
    cancelReply();scrollMsgs();
  };
  reader.readAsDataURL(file);
};

window.searchForUsers=function(q,resId){

  const qc=q.replace('@','').toLowerCase();

  if(!matches.length){res.innerHTML='<div style="padding:14px;text-align:center;font-size:14px;color:var(--t2)">Пользователи не найдены</div>';return}
  res.innerHTML=matches.map(u=>{
    const isSel=grpSelected.includes(u.username);
    const chkHtml=isSel?`<div class="urchk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`:'';
    const onlineDot=u.online?'<span style="margin-left:6px;color:var(--green);font-size:11px;font-weight:600">● в сети</span>':'';
    const fn=resId==='gs-res'?`startDMSearch`:`selectNewChatUser`;
    return`<div class="urow" onclick="${fn}('${u.username}')">
      ${avHtmlUser(u,'sm')}
      <div class="urinfo"><div class="urname">${esc(u.name)}</div><div class="urun">@${u.username}${onlineDot}</div></div>
      ${chkHtml}
    </div>`;
  }).join('');
};

window.selectNewChatUser=function(un){
  if(grpMode==='dm'){
    closeModal('m-new');
    setTimeout(async()=>{
      const chatId=await getOrCreateDM(un);
      openChat(chatId);
    },280);
  }else{
    if(grpSelected.includes(un))grpSelected=grpSelected.filter(x=>x!==un);
    else grpSelected.push(un);
    updateGrpChips();
    searchForUsers(document.getElementById('nc-sinp').value,'nc-res');
  }
};

window.startDMSearch=function(un){
  closeModal('m-search');
  setTimeout(async()=>{
    const chatId=await getOrCreateDM(un);
    openChat(chatId);
  },280);
};

async function getOrCreateDM(otherUn){
  // Check if DM exists
  const existing=Object.values(ALL_CHATS).find(c=>c.type==='dm'&&c.members&&c.members[ME]&&c.members[otherUn]);
  if(existing)return existing.id;
  const newRef=push(ref(db,'chats'));
  const chatId=newRef.key;
  const chatData={id:chatId,type:'dm',members:{[ME]:true,[otherUn]:true},lastMsg:'',lastMsgFrom:'',lastMsgTime:Date.now(),createdAt:Date.now()};
  await set(newRef,chatData);
  return chatId;
}

window.updateGrpChips=function(){
  const chips=document.getElementById('grp-chips');
  chips.innerHTML=grpSelected.map(un=>{
    const u=ALL_USERS[un];
    return u?`<div class="chip">${avHtmlUser(u,'xs')}<span>${esc(u.name.split(' ')[0])}</span><button class="chipx" onclick="removeGrpUser('${un}')">×</button></div>`:''
  }).join('');
};
window.removeGrpUser=function(un){grpSelected=grpSelected.filter(x=>x!==un);updateGrpChips();searchForUsers(document.getElementById('nc-sinp').value,'nc-res')};

window.createGroup=async function(){
  const name=document.getElementById('grp-name').value.trim();
  if(!name){showToast('Введите название группы');return}
  if(!grpSelected.length){showToast('Выберите хотя бы одного участника');return}
  const members={[ME]:true};
  grpSelected.forEach(u=>{members[u]=true});
  const newRef=push(ref(db,'chats'));
  const chatId=newRef.key;
  await set(newRef,{id:chatId,type:'group',name,members,creator:ME,color:rcolor(),avatar:null,lastMsg:'',lastMsgFrom:'',lastMsgTime:Date.now(),createdAt:Date.now()});
  // Notify
  const introRef=push(ref(db,'messages/'+chatId));
  await set(introRef,{id:introRef.key,from:ME,text:`${ALL_USERS[ME]?.name||ME} создал(а) группу «${name}»`,ts:Date.now(),system:true,edited:false,deleted:false});
  await update(ref(db,'chats/'+chatId),{lastMsg:`Группа создана`,lastMsgFrom:ME,lastMsgTime:Date.now()});
  closeModal('m-new');
  setTimeout(()=>openChat(chatId),280);
};

window.saveProfile=async function(){

window.uploadAvatar=function(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    // Resize to max 200px for DB storage
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const MAX=200;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*MAX/w;w=MAX}}else{if(h>MAX){w=w*MAX/h;h=MAX}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.8);
      await update(ref(db,'users/'+ME),{avatar:dataUrl});
      showToast('Фото обновлено ✓');
      goSettings();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
};

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════
async function boot(){
  const loader=document.getElementById('loader');
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  try{
    const sess=localStorage.getItem('tgx_sess');
    if(sess){
      const snap=await get(ref(db,'users/'+sess));
      if(snap.exists()){
        ME=sess;
        await update(ref(db,'users/'+ME),{online:true,lastSeen:Date.now()});
        loader.style.display='none';
        enterApp();
        return;
      }
    }
    loader.style.display='none';
    document.getElementById('s-auth').classList.remove('hidden');
    screenStack=['s-auth'];
  }catch(e){
    loader.innerHTML=`<p style="color:white;padding:20px;text-align:center">Ошибка подключения к Firebase.<br><small>${e.message}</small></p>`;
  }
}
boot();
