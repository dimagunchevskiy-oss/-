<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telegram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --blue:#2AABEE;--blue-d:#1a9fe0;--blue-l:#e8f4fd;--blue-ll:#d0eafb;
  --bg:#fff;--surface:#f4f4f5;--border:#e4e4e7;
  --text:#111;--text2:#71717a;--text3:#a1a1aa;
  --out-bg:#effdde;--in-bg:#fff;
  --online:#4ade80;--danger:#ef4444;
  --header:#2AABEE;--chat-bg:#efeae2;
  --radius:14px;--hh:56px;--fh:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;color:var(--text);position:fixed;width:100%;height:100dvh}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform}
.screen.hidden{transform:translateX(100%);pointer-events:none}
.screen.slide-behind{transform:translateX(-25%);pointer-events:none;opacity:.6}

/* ── AUTH ── */
#scr-auth{background:linear-gradient(160deg,#1788c8 0%,#2AABEE 50%,#5cc8f8 100%);justify-content:flex-end;align-items:center}
.auth-top{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding-top:max(60px,8vh);animation:fadeDown .6s ease both}
.auth-logo{width:90px;height:90px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.3)}
.auth-logo svg{width:50px;height:50px}
.auth-top h1{color:#fff;font-size:28px;font-weight:700;letter-spacing:-.4px}
.auth-top p{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px}
.auth-card{background:#fff;border-radius:24px 24px 0 0;padding:26px 22px max(36px,env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideUp .45s ease both .1s;box-shadow:0 -8px 40px rgba(0,0,0,.12);overflow-y:auto;max-height:74vh}
.auth-tabs{display:flex;background:var(--surface);border-radius:12px;padding:3px;margin-bottom:22px}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s}
.auth-tab.active{background:#fff;color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.auth-form{display:flex;flex-direction:column;gap:13px}
.auth-form.hidden{display:none}
.inp-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.inp-group input{width:100%;padding:12px 15px;border:1.5px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s}
.inp-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,171,238,.13)}
.btn-blue{padding:13px;background:var(--blue);color:#fff;border:none;border-radius:13px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;margin-top:3px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-blue:active{transform:scale(.98);background:var(--blue-d)}
.auth-err{font-size:12px;color:var(--danger);text-align:center;min-height:16px;font-weight:500}

/* ── HEADER ── */
.app-header{height:var(--hh);background:var(--header);display:flex;align-items:center;padding:0 6px 0 2px;gap:2px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.18);z-index:10}
.hbtn{width:44px;height:44px;background:transparent;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;transition:background .15s}
.hbtn:active{background:rgba(255,255,255,.2)}
.hbtn svg{width:22px;height:22px}
.h-title{flex:1;font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.h-title.sm{font-size:15px;font-weight:600}
.h-sub{font-size:12px;color:rgba(255,255,255,.78);font-weight:400;margin-top:1px}
.h-info{flex:1;display:flex;flex-direction:column;gap:0}
.h-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;margin-right:8px;overflow:hidden;position:relative}
.h-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── SEARCH ── */
.search-bar{padding:7px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--text3);pointer-events:none}
.search-wrap input{width:100%;padding:8px 14px 8px 34px;background:var(--surface);border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none}

/* ── CHAT LIST ── */
#scr-list .body{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;padding:9px 14px;gap:11px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);position:relative}
.chat-item:active{background:var(--surface)}
.chat-item.unread-item .chat-name{font-weight:700}
.av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;position:relative;flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av.sm{width:38px;height:38px;font-size:14px}
.av.xs{width:32px;height:32px;font-size:12px}
.online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--online);border-radius:50%;border:2px solid #fff}
.chat-info{flex:1;min-width:0}
.chat-name-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.chat-name{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-time{font-size:12px;color:var(--text2);flex-shrink:0}
.chat-preview{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;display:flex;align-items:center;gap:3px}
.you-label{color:var(--blue);font-weight:500}
.unread-badge{background:var(--blue);color:#fff;border-radius:12px;font-size:11px;font-weight:700;padding:2px 6px;min-width:20px;text-align:center;flex-shrink:0}
.muted-badge{background:var(--text3);color:#fff;border-radius:12px;font-size:11px;font-weight:700;padding:2px 6px;min-width:20px;text-align:center;flex-shrink:0}

/* ── FAB ── */
.fab{position:absolute;bottom:20px;right:18px;width:54px;height:54px;background:var(--blue);border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(42,171,238,.45);z-index:20;transition:background .2s,transform .15s;color:#fff}
.fab:active{transform:scale(.93);background:var(--blue-d)}
.fab svg{width:26px;height:26px}

/* ── MESSAGES ── */
#scr-chat .body{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:2px;background:var(--chat-bg) url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='%232aabee' fill-opacity='.06'/%3E%3C/svg%3E")}
.date-div{align-self:center;background:rgba(0,0,0,.28);color:#fff;font-size:12px;font-weight:500;padding:4px 12px;border-radius:12px;margin:7px 0;user-select:none}
.msg-wrap{display:flex;flex-direction:column;max-width:78%;animation:msgIn .18s ease both;position:relative}
.msg-wrap.out{align-self:flex-end;align-items:flex-end}
.msg-wrap.in{align-self:flex-start;align-items:flex-start}
.msg-sender{font-size:12px;font-weight:600;margin-bottom:3px;padding:0 4px}
.msg-bubble{padding:7px 11px 5px;border-radius:16px;font-size:14px;line-height:1.5;position:relative;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.msg-wrap.out .msg-bubble{background:var(--out-bg);border-bottom-right-radius:4px}
.msg-wrap.in .msg-bubble{background:var(--in-bg);border-bottom-left-radius:4px}
.msg-bubble.reply-bubble{border-left:3px solid var(--blue);padding-left:9px}
.reply-preview{font-size:12px;color:var(--blue);font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.reply-text{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.msg-meta{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3);margin-top:2px;padding:0 3px;justify-content:flex-end}
.msg-wrap.in .msg-meta{justify-content:flex-start}
.edited-label{font-size:10px;color:var(--text3);font-style:italic}
.check-svg{width:15px;height:15px;color:var(--blue);flex-shrink:0}
.check-svg.grey{color:var(--text3)}

/* MSG CONTEXT MENU */
.msg-ctx{position:absolute;background:#fff;border-radius:13px;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:200;padding:6px 0;min-width:170px;overflow:hidden;animation:ctxIn .15s ease}
.msg-ctx.right{right:0}
.msg-ctx.left{left:0}
.ctx-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:background .12s;color:var(--text)}
.ctx-item:active{background:var(--surface)}
.ctx-item.red{color:var(--danger)}
.ctx-item svg{width:18px;height:18px;flex-shrink:0}

/* ── REPLY BAR ── */
.reply-bar{display:none;align-items:center;padding:8px 12px;background:var(--bg);border-top:1px solid var(--border);gap:10px;flex-shrink:0}
.reply-bar.show{display:flex}
.reply-bar-line{width:3px;height:36px;background:var(--blue);border-radius:2px;flex-shrink:0}
.reply-bar-info{flex:1;min-width:0}
.reply-bar-name{font-size:12px;font-weight:700;color:var(--blue)}
.reply-bar-text{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reply-bar-close{width:28px;height:28px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.reply-bar-close svg{width:18px;height:18px}

/* ── EDIT BAR ── */
.edit-bar{display:none;align-items:center;padding:7px 12px;background:#fffde7;border-top:1px solid #ffe082;gap:10px;flex-shrink:0}
.edit-bar.show{display:flex}
.edit-bar-text{flex:1;font-size:13px;color:var(--text2)}
.edit-bar span{color:var(--blue);font-weight:600}
.edit-bar-close{width:28px;height:28px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* ── CHAT FOOTER ── */
.chat-footer{min-height:var(--fh);background:var(--bg);display:flex;align-items:flex-end;padding:8px 8px 8px 10px;gap:7px;flex-shrink:0;border-top:1px solid var(--border)}
.msg-inp-wrap{flex:1;background:var(--surface);border-radius:22px;display:flex;align-items:flex-end;padding:5px 10px 5px 14px;border:1.5px solid transparent;transition:border-color .2s}
.msg-inp-wrap:focus-within{border-color:var(--blue)}
.msg-inp{flex:1;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.45;padding:4px 0}
.send-btn{width:44px;height:44px;background:var(--blue);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .13s;flex-shrink:0;box-shadow:0 2px 8px rgba(42,171,238,.38);color:#fff}
.send-btn:active{transform:scale(.91);background:var(--blue-d)}
.send-btn svg{width:20px;height:20px}
.attach-btn{width:36px;height:36px;border:none;background:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.attach-btn svg{width:22px;height:22px}

/* ── TYPING INDICATOR ── */
.typing-indicator{display:none;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:var(--text2);font-style:italic}
.typing-indicator.show{display:flex}
.typing-dots span{display:inline-block;width:6px;height:6px;background:var(--text3);border-radius:50%;animation:typingBounce 1.2s infinite;margin:0 1px}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

/* ── SETTINGS ── */
#scr-settings .body{flex:1;overflow-y:auto}
.settings-profile{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;background:linear-gradient(180deg,var(--blue-ll) 0%,#fff 100%);border-bottom:1px solid var(--border);gap:8px;position:relative}
.settings-av{width:82px;height:82px;border-radius:50%;font-size:29px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.15);overflow:hidden;cursor:pointer;position:relative}
.settings-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.settings-av-overlay{position:absolute;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:0;transition:opacity .2s}
.settings-av:hover .settings-av-overlay{opacity:1}
.settings-av-overlay svg{width:26px;height:26px;color:#fff}
.settings-name{font-size:20px;font-weight:700;color:var(--text)}
.settings-username{font-size:14px;color:var(--text2)}
.settings-sec{padding:16px 14px 6px}
.settings-sec-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding:0 3px}
.settings-card{background:var(--bg);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.settings-row{display:flex;align-items:center;padding:13px 14px;gap:11px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.srow-icon{width:34px;height:34px;background:var(--blue-l);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.srow-icon svg{width:17px;height:17px;color:var(--blue)}
.srow-body{flex:1;min-width:0}
.srow-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.srow-value{font-size:15px;color:var(--text2);margin-top:2px}
.srow-input{width:100%;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;margin-top:2px}
.settings-save{margin:14px 14px 6px;width:calc(100% - 28px)}
.settings-logout{margin:4px 14px 28px;width:calc(100% - 28px);padding:13px;background:#fee2e2;color:var(--danger);border:none;border-radius:13px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;background:#fff;border-radius:20px 20px 0 0;padding:14px;max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.modal-ov.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:12px}
.modal-results{flex:1;overflow-y:auto}
.user-row{display:flex;align-items:center;gap:11px;padding:10px 4px;cursor:pointer;border-bottom:1px solid var(--border);border-radius:10px;transition:background .12s}
.user-row:active{background:var(--surface)}
.user-row-info{flex:1}
.user-row-name{font-size:15px;font-weight:600}
.user-row-un{font-size:13px;color:var(--text2)}
.user-row-check{width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-row-check svg{width:14px;height:14px;color:#fff}
.modal-footer{padding-top:12px;border-top:1px solid var(--border);margin-top:8px}

/* ── GROUP CREATE ── */
.new-chat-tab{display:flex;gap:8px;margin-bottom:14px}
.nct-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:11px;background:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.nct-btn svg{width:16px;height:16px}
.nct-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.group-setup{display:none;margin-bottom:12px}
.group-setup.show{display:block}
.group-inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:10px;transition:border-color .2s}
.group-inp:focus{border-color:var(--blue)}
.selected-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:0}
.chip{display:flex;align-items:center;gap:5px;background:var(--blue-l);border-radius:20px;padding:4px 10px 4px 6px;font-size:13px;font-weight:600;color:var(--blue)}
.chip .av.xs{flex-shrink:0}
.chip-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px}

/* ── GROUP HEADER INFO ── */
.group-members-bar{padding:6px 14px;background:var(--blue-ll);font-size:12px;color:var(--blue);font-weight:600;border-bottom:1px solid var(--blue-l);flex-shrink:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(0,0,0,.78);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:var(--text2);padding:24px;text-align:center}
.empty-s svg{width:60px;height:60px;opacity:.25}
.empty-s p{font-size:13px;line-height:1.5}

/* ── ANIMATIONS ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes ctxIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* OVERLAY for ctx dismiss */
#ctx-overlay{position:fixed;inset:0;z-index:199;display:none}
#ctx-overlay.show{display:block}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="scr-auth" class="screen">
  <div class="auth-top">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Telegram</h1>
    <p>Быстро. Безопасно. Надёжно.</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login')">Войти</button>
      <button class="auth-tab" onclick="authTab('reg')">Регистрация</button>
    </div>
    <!-- Login -->
    <div id="f-login" class="auth-form">
      <div class="inp-group"><label>Имя пользователя</label><input id="l-un" type="text" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="inp-group"><label>Пароль</label><input id="l-pw" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-err" id="l-err"></div>
      <button class="btn-blue" onclick="doLogin()">Войти</button>
    </div>
    <!-- Register -->
    <div id="f-reg" class="auth-form hidden">
      <div class="inp-group"><label>Имя</label><input id="r-name" type="text"></div>
      <div class="inp-group"><label>Имя пользователя (постоянное)</label><input id="r-un" type="text" placeholder="без @, только a-z 0-9 _"></div>

<script>
// ══════════════════════════════════════════════════
//  CONSTANTS & HELPERS
// ══════════════════════════════════════════════════
const COLORS=['#E91E63','#9C27B0','#673AB7','#3F51B5','#2196F3','#009688','#4CAF50','#FF9800','#FF5722','#795548','#00BCD4','#607D8B'];
const rand=arr=>arr[Math.floor(Math.random()*arr.length)];
const randColor=()=>rand(COLORS);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getInit=name=>name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
const fmtTime=ts=>{const d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});const diff=n-d;if(diff<172800000)return 'Вчера';return d.toLocaleDateString([],{day:'numeric',month:'short'})};
const fmtDate=ts=>new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
const fmtFull=ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

// ══════════════════════════════════════════════════
//  DATABASE
// ══════════════════════════════════════════════════
const DB={
  _get(k,def={}){try{return JSON.parse(localStorage.getItem(k)||null)||def}catch{return def}},
  _set(k,v){localStorage.setItem(k,JSON.stringify(v))},
  getUsers(){return this._get('tgx_users')},
  saveUsers(u){this._set('tgx_users',u)},
  getAllMessages(){return this._get('tgx_msgs')},
  saveAllMessages(m){this._set('tgx_msgs',m)},
  getSession(){return localStorage.getItem('tgx_sess')},
  setSession(u){localStorage.setItem('tgx_sess',u)},
  clearSession(){localStorage.removeItem('tgx_sess')},
  getConvos(u){return this._get('tgx_cv_'+u,[])},
  saveConvos(u,l){this._set('tgx_cv_'+u,l)},
  getChats(){return this._get('tgx_chats')},
  saveChats(c){this._set('tgx_chats',c)},

  getUser(un){return this.getUsers()[un.toLowerCase()]||null},
  createUser(name,un,pw){
    const users=this.getUsers(),k=un.toLowerCase();
    if(users[k])return false;
    users[k]={name,username:k,pw,color:randColor(),avatar:null,createdAt:Date.now(),online:false,lastSeen:Date.now()};
    this.saveUsers(users);return true;
  },
  updateUser(un,data){
    const users=this.getUsers(),k=un.toLowerCase();
    if(!users[k])return;
    Object.assign(users[k],data);
    this.saveUsers(users);
  },
  setOnline(un,online){
    const users=this.getUsers(),k=un.toLowerCase();
    if(!users[k])return;
    users[k].online=online;
    if(!online)users[k].lastSeen=Date.now();
    this.saveUsers(users);
  },

  // Chat = {id, type:'dm'|'group', members:[], name (for group), avatar, createdAt}
  getChatById(id){return this.getChats()[id]||null},
  createDM(a,b){
    const chats=this.getChats();
    // Check existing
    const existing=Object.values(chats).find(c=>c.type==='dm'&&c.members.includes(a)&&c.members.includes(b));
    if(existing)return existing.id;
    const id='dm_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    chats[id]={id,type:'dm',members:[a,b],createdAt:Date.now()};
    this.saveChats(chats);
    [a,b].forEach(u=>{let cv=this.getConvos(u).filter(x=>x!==id);cv.unshift(id);this.saveConvos(u,cv)});
    return id;
  },
  createGroup(name,members,creator){
    const chats=this.getChats();
    const id='grp_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    chats[id]={id,type:'group',name,members,creator,avatar:null,color:randColor(),createdAt:Date.now()};
    this.saveChats(chats);
    members.forEach(u=>{let cv=this.getConvos(u).filter(x=>x!==id);cv.unshift(id);this.saveConvos(u,cv)});
    return id;
  },

  getMsgs(chatId){const m=this.getAllMessages();return m[chatId]||[]},
  addMsg(chatId,from,text,replyTo=null){
    const m=this.getAllMessages();
    if(!m[chatId])m[chatId]=[];
    const msg={id:'msg_'+Date.now()+'_'+Math.random().toString(36).slice(2),from,text,ts:Date.now(),replyTo,edited:false,deleted:false};
    m[chatId].push(msg);
    this.saveAllMessages(m);
    // bump convos for all members
    const chat=this.getChatById(chatId);
    if(chat)chat.members.forEach(u=>{let cv=this.getConvos(u).filter(x=>x!==chatId);cv.unshift(chatId);this.saveConvos(u,cv)});
    return msg;
  },
  editMsg(chatId,msgId,newText){
    const m=this.getAllMessages();
    if(!m[chatId])return;
    const msg=m[chatId].find(x=>x.id===msgId);
    if(msg){msg.text=newText;msg.edited=true;msg.editedAt=Date.now()}
    this.saveAllMessages(m);
  },
  deleteMsg(chatId,msgId){
    const m=this.getAllMessages();
    if(!m[chatId])return;
    const msg=m[chatId].find(x=>x.id===msgId);
    if(msg){msg.deleted=true;msg.text='Сообщение удалено'}
    this.saveAllMessages(m);
  },

  searchUsers(q,exclude){
    q=q.toLowerCase().replace('@','');
    return Object.values(this.getUsers()).filter(u=>u.username!==exclude&&(u.username.startsWith(q)||u.name.toLowerCase().includes(q)));
  }
};

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let CU=null; // current user
let currentChatId=null;
let screenStack=[];
let replyTo=null; // {msgId, from, text}
let editingMsgId=null;
let currentCtxMenu=null;
let newChatMode='dm';
let grpSelectedUsers=[];
let typingTimer=null;

// ══════════════════════════════════════════════════
//  AVATAR RENDERING
// ══════════════════════════════════════════════════
function avHtml(user,cls=''){
  if(!user)return`<div class="av ${cls}" style="background:#999">?</div>`;
  if(user.avatar)return`<div class="av ${cls}"><img src="${user.avatar}" alt=""></div>`;
  return`<div class="av ${cls}" style="background:${user.color}">${getInit(user.name)}</div>`;
}
function avHtmlChat(chat,cls=''){
  if(chat.type==='group'){
    if(chat.avatar)return`<div class="av ${cls}"><img src="${chat.avatar}" alt=""></div>`;
    return`<div class="av ${cls}" style="background:${chat.color||'#2196F3'}">${getInit(chat.name)}</div>`;
  }
  const other=chat.members.find(m=>m!==CU);
  const u=DB.getUser(other);
  return avHtml(u,cls);
}
function getChatName(chat){
  if(chat.type==='group')return chat.name;
  const other=chat.members.find(m=>m!==CU);
  const u=DB.getUser(other);
  return u?u.name:'Удалённый аккаунт';
}
function getChatStatus(chat){
  if(chat.type==='group'){
    return`${chat.members.length} участников`;
  }
  const other=chat.members.find(m=>m!==CU);
  const u=DB.getUser(other);
  if(!u)return'';
  if(u.online)return'в сети';
  if(u.lastSeen){const diff=Date.now()-u.lastSeen;if(diff<60000)return'был(а) только что';if(diff<3600000)return`был(а) ${Math.floor(diff/60000)} мин. назад`;return`был(а) ${new Date(u.lastSeen).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}`;}
  return'';
}

// ══════════════════════════════════════════════════
//  SCREEN NAVIGATION
// ══════════════════════════════════════════════════
function showScreen(id,push=true){
  const cur=screenStack[screenStack.length-1];
  if(cur&&cur!==id)document.getElementById(cur)?.classList.add('slide-behind');
  if(push&&(screenStack.length===0||screenStack[screenStack.length-1]!==id))screenStack.push(id);
  document.querySelectorAll('.screen').forEach(s=>{s.classList.add('hidden');s.classList.remove('slide-behind')});
  document.getElementById(id).classList.remove('hidden');
}
function goBack(){
  screenStack.pop();
  const prev=screenStack[screenStack.length-1]||'scr-list';
  document.querySelectorAll('.screen').forEach(s=>{s.classList.add('hidden');s.classList.remove('slide-behind')});
  document.getElementById(prev).classList.remove('hidden');
  if(prev==='scr-list')renderChatList();
}

// ══════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════
function authTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('f-login').classList.toggle('hidden',tab!=='login');
  document.getElementById('f-reg').classList.toggle('hidden',tab!=='reg');
  document.getElementById('l-err').textContent='';
  document.getElementById('r-err').textContent='';
}
function doLogin(){
  const un=document.getElementById('l-un').value.trim().replace('@','').toLowerCase();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');
  err.textContent='';
  if(!un||!pw){err.textContent='Заполните все поля';return}
  const u=DB.getUser(un);
  if(!u||u.pw!==pw){err.textContent='Неверный логин или пароль';return}
  DB.setOnline(un,true);
  DB.setSession(un);CU=un;enterApp();
}
function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const un=document.getElementById('r-un').value.trim().replace('@','').toLowerCase();
  const pw=document.getElementById('r-pw').value;
  const err=document.getElementById('r-err');
  err.textContent='';
  if(!name||!un||!pw){err.textContent='Заполните все поля';return}
  if(un.length<3){err.textContent='Имя пользователя минимум 3 символа';return}
  if(!/^[a-z0-9_]+$/.test(un)){err.textContent='Только a-z, 0-9, _';return}
  if(pw.length<6){err.textContent='Пароль минимум 6 символов';return}
  if(!DB.createUser(name,un,pw)){err.textContent='Этот логин уже занят';return}
  DB.setOnline(un,true);
  DB.setSession(un);CU=un;enterApp();
}
function doLogout(){

// ══════════════════════════════════════════════════
//  CHAT LIST
// ══════════════════════════════════════════════════
function renderChatList(filter=''){
  const body=document.getElementById('chat-list-body');
  let convos=DB.getConvos(CU);
  const chats=DB.getChats();
  let items=convos.map(id=>chats[id]).filter(Boolean);
  if(filter){
    const q=filter.toLowerCase();
    items=items.filter(c=>{
      const name=getChatName(c).toLowerCase();
      if(name.includes(q))return true;
      if(c.type==='dm'){const other=c.members.find(m=>m!==CU);return other&&other.includes(q)}
      return false;
    });
  }
  if(!items.length){
    body.innerHTML=`<div class="empty-s"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>${filter?'Ничего не найдено':'Нет чатов. Нажмите ✏️ чтобы начать новый.'}</p></div>`;
    return;
  }
  body.innerHTML=items.map(chat=>{
    const msgs=DB.getMsgs(chat.id);
    const last=msgs.filter(m=>!m.deleted)[msgs.filter(m=>!m.deleted).length-1];
    const isMe=last&&last.from===CU;
    let preview='';
    if(last){
      const senderName=chat.type==='group'&&!isMe?DB.getUser(last.from)?.name?.split(' ')[0]+': ':'';
      preview=`${isMe?'<span class="you-label">Вы: </span>':''}${senderName}${esc(last.text).slice(0,50)}`;
    }else{preview='<em style="color:#bbb">Нет сообщений</em>'}
    const time=last?fmtTime(last.ts):'';
    // online dot
    let dotHtml='';
    if(chat.type==='dm'){
      const other=chat.members.find(m=>m!==CU);
      const ou=DB.getUser(other);
      if(ou?.online)dotHtml='<div class="online-dot"></div>';
    }
    const avEl=avHtmlChat(chat);
    const avWrapped=avEl.replace('class="av','class="av').replace('>','>' + dotHtml); // inject dot
    // actually simpler:
    const avHtmlFinal=avHtmlChatWithDot(chat);
    return`<div class="chat-item" onclick="openChat('${chat.id}')">
      ${avHtmlFinal}
      <div class="chat-info">
        <div class="chat-name-row">
          <span class="chat-name">${esc(getChatName(chat))}</span>
          <span class="chat-time">${time}</span>
        </div>
        <div class="chat-preview">${preview}</div>
      </div>
    </div>`;
  }).join('');
}

function avHtmlChatWithDot(chat){
  const dot=()=>{
    if(chat.type==='dm'){const other=chat.members.find(m=>m!==CU);const ou=DB.getUser(other);if(ou?.online)return'<div class="online-dot"></div>';}
    return'';
  };
  if(chat.type==='group'){
    if(chat.avatar)return`<div class="av" style="background:${chat.color||'#2196F3'};position:relative"><img src="${chat.avatar}" alt="">${dot()}</div>`;
    return`<div class="av" style="background:${chat.color||'#2196F3'};position:relative">${getInit(chat.name)}${dot()}</div>`;
  }
  const other=chat.members.find(m=>m!==CU);
  const u=DB.getUser(other);
  if(!u)return`<div class="av" style="background:#999;position:relative">?${dot()}</div>`;
  if(u.avatar)return`<div class="av" style="position:relative"><img src="${u.avatar}" alt="">${dot()}</div>`;
  return`<div class="av" style="background:${u.color};position:relative">${getInit(u.name)}${dot()}</div>`;
}

function filterChats(v){renderChatList(v)}

//  OPEN CHAT

function openChat(chatId){
  const chat=DB.getChatById(chatId);
  if(!chat)return;
  currentChatId=chatId;
  cancelReply();cancelEdit();

  // Header
  const avEl=document.getElementById('chat-h-av');
  if(chat.type==='group'){
    avEl.style.background=chat.color||'#2196F3';
    avEl.innerHTML=chat.avatar?`<img src="${chat.avatar}" alt="">`:`${getInit(chat.name)}`;
    document.getElementById('chat-h-name').textContent=chat.name;
    document.getElementById('chat-h-status').textContent=`${chat.members.length} участников`;
    document.getElementById('group-members-bar').style.display='block';
    document.getElementById('group-members-bar').textContent='Участники: '+chat.members.map(m=>{const u=DB.getUser(m);return u?u.name:m}).join(', ');
  }else{
    const other=chat.members.find(m=>m!==CU);
    const u=DB.getUser(other);
    if(u){
      avEl.style.background=u.color;
      avEl.innerHTML=u.avatar?`<img src="${u.avatar}" alt="">`:`${getInit(u.name)}`;
    }
    document.getElementById('chat-h-name').textContent=getChatName(chat);
    document.getElementById('chat-h-status').textContent=getChatStatus(chat);
    document.getElementById('group-members-bar').style.display='none';
  }
  renderMessages();
  showScreen('scr-chat');
  setTimeout(scrollMsgs,80);
}

// ══════════════════════════════════════════════════
//  RENDER MESSAGES
// ══════════════════════════════════════════════════
function renderMessages(){
  const body=document.getElementById('messages-body');
  const msgs=DB.getMsgs(currentChatId);
  const chat=DB.getChatById(currentChatId);
  if(!msgs.length){
    body.innerHTML=`<div class="empty-s" style="background:transparent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Начните переписку!</p></div>`;
    return;
  }
  let html='',lastDate=null;
  msgs.forEach(msg=>{
    const d=fmtDate(msg.ts);
    if(d!==lastDate){html+=`<div class="date-div">${d}</div>`;lastDate=d;}
    const isOut=msg.from===CU;
    const t=fmtFull(msg.ts);
    const isDeleted=msg.deleted;
    const sender=DB.getUser(msg.from);

    // reply quote
    let replyHtml='';
    if(msg.replyTo&&!isDeleted){
      const orig=msgs.find(m=>m.id===msg.replyTo);
      if(orig){
        const rs=DB.getUser(orig.from);
        replyHtml=`<div class="reply-preview">${esc(rs?.name||orig.from)}</div><div class="reply-text">${esc(orig.text.slice(0,60))}</div>`;
      }
    }

    const bubbleClass=replyHtml?'msg-bubble reply-bubble':'msg-bubble';
    const senderHtml=(!isOut&&chat?.type==='group'&&!isDeleted)?`<div class="msg-sender" style="color:${sender?.color||'var(--blue)'}">${esc(sender?.name||msg.from)}</div>`:'';

    // checks
    let checksHtml='';
    if(isOut&&!isDeleted)checksHtml=`<svg class="check-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    const editedHtml=msg.edited&&!isDeleted?`<span class="edited-label">ред.</span>`:'';
    const deletedStyle=isDeleted?'color:var(--text3);font-style:italic':'';

    html+=`<div class="msg-wrap ${isOut?'out':'in'}" data-id="${msg.id}" oncontextmenu="showCtxMenu(event,'${msg.id}',${isOut?'true':'false'})" ontouchstart="handleTouchStart(event,'${msg.id}',${isOut?'true':'false'})">
      ${senderHtml}
      <div class="${bubbleClass}" style="${deletedStyle}">
        ${replyHtml}
        ${esc(msg.text)}
      </div>
      <div class="msg-meta">
        ${editedHtml}
        <span>${t}</span>
        ${checksHtml}
      </div>
    </div>`;
  });
  body.innerHTML=html;
}

function scrollMsgs(){const b=document.getElementById('messages-body');b.scrollTop=b.scrollHeight}

// ══════════════════════════════════════════════════
//  SEND / EDIT MESSAGE
// ══════════════════════════════════════════════════
function sendMessage(){
  const inp=document.getElementById('msg-inp');
  const text=inp.value.trim();
  if(!text||!currentChatId)return;
  inp.value='';inp.style.height='';

  if(editingMsgId){
    DB.editMsg(currentChatId,editingMsgId,text);
    cancelEdit();
    renderMessages();scrollMsgs();
    renderChatList();
    return;
  }

  const replyId=replyTo?replyTo.msgId:null;
  DB.addMsg(currentChatId,CU,text,replyId);
  cancelReply();
  renderMessages();scrollMsgs();
  renderChatList();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}

// ══════════════════════════════════════════════════
//  REPLY
// ══════════════════════════════════════════════════
function startReply(msgId){
  const msgs=DB.getMsgs(currentChatId);
  const msg=msgs.find(m=>m.id===msgId);
  if(!msg)return;
  replyTo={msgId,from:msg.from,text:msg.text};
  const sender=DB.getUser(msg.from);
  document.getElementById('rb-name').textContent=sender?.name||msg.from;
  document.getElementById('rb-text').textContent=msg.text.slice(0,80);
  document.getElementById('reply-bar').classList.add('show');
  document.getElementById('msg-inp').focus();
}
function cancelReply(){
  replyTo=null;
  document.getElementById('reply-bar').classList.remove('show');
}

// ══════════════════════════════════════════════════
function startEdit(msgId){
  const msgs=DB.getMsgs(currentChatId);
  const msg=msgs.find(m=>m.id===msgId);
  if(!msg)return;
  editingMsgId=msgId;
  const inp=document.getElementById('msg-inp');

}

  editingMsgId=null;
  document.getElementById('edit-bar').classList.remove('show');

}

// ══════════════════════════════════════════════════
//  CONTEXT MENU
// ══════════════════════════════════════════════════
let touchTimer=null;
function handleTouchStart(e,msgId,isOut){
  touchTimer=setTimeout(()=>{showCtxMenu(e,msgId,isOut)},500);
}
document.addEventListener('touchend',()=>{if(touchTimer){clearTimeout(touchTimer);touchTimer=null}});

function showCtxMenu(e,msgId,isOut){
  e.preventDefault();
  dismissCtxMenu();
  const msgs=DB.getMsgs(currentChatId);
  const msg=msgs.find(m=>m.id===msgId);
  if(!msg||msg.deleted)return;

  const menu=document.createElement('div');
  menu.id='ctx-menu';
  menu.className='msg-ctx '+(isOut?'right':'left');

  let items=`<div class="ctx-item" onclick="startReply('${msgId}');dismissCtxMenu()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>Ответить</div>`;
  items+=`<div class="ctx-item" onclick="copyMsg('${msgId}');dismissCtxMenu()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Копировать</div>`;
  if(isOut){
    items+=`<div class="ctx-item" onclick="startEdit('${msgId}');dismissCtxMenu()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>Редактировать</div>`;
    items+=`<div class="ctx-item red" onclick="deleteMsg('${msgId}');dismissCtxMenu()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>Удалить</div>`;
  }
  menu.innerHTML=items;

  // Position near the message
  const wrap=document.querySelector(`.msg-wrap[data-id="${msgId}"]`);
  if(wrap){
    wrap.style.position='relative';
    wrap.appendChild(menu);
  }
  currentCtxMenu={menu,wrap};
  document.getElementById('ctx-overlay').classList.add('show');
}

function dismissCtxMenu(){
  if(currentCtxMenu){currentCtxMenu.menu.remove();currentCtxMenu=null}
  document.getElementById('ctx-overlay').classList.remove('show');
}

function copyMsg(msgId){
  const msgs=DB.getMsgs(currentChatId);
  const msg=msgs.find(m=>m.id===msgId);
  if(!msg)return;
  navigator.clipboard?.writeText(msg.text).then(()=>toast('Скопировано')).catch(()=>toast('Ошибка копирования'));
}

function onTyping(){
  // In a real app this would be via WebSocket.
  // Here we just store a typing flag in sessionStorage.
  const chatId=currentChatId;
  sessionStorage.setItem('tg_typing_'+chatId+'_'+CU, Date.now());
}

function checkTyping(){
  if(!currentChatId)return;
  const chat=DB.getChatById(currentChatId);
  if(!chat)return;
  const others=chat.members.filter(m=>m!==CU);
  const typers=[];
  others.forEach(un=>{
    const t=sessionStorage.getItem('tg_typing_'+currentChatId+'_'+un);
    if(t&&Date.now()-Number(t)<3000){
      const u=DB.getUser(un);
      if(u)typers.push(u.name.split(' ')[0]);
    }
  });
  const ind=document.getElementById('typing-ind');
  const txt=document.getElementById('typing-text');
  if(typers.length){
    txt.textContent=typers.join(', ')+(typers.length===1?' печатает…':' печатают…');
    ind.classList.add('show');
  }else{ind.classList.remove('show')}
}
setInterval(checkTyping,500);

function searchUsers(q){
  const res=document.getElementById('user-search-res');
  if(!q){res.innerHTML='<div style="padding:14px 4px;font-size:13px;color:var(--text2)">Начните вводить для поиска</div>';return}
  const matches=DB.searchUsers(q,CU);
  if(!matches.length){res.innerHTML='<div style="padding:14px;text-align:center;font-size:14px;color:var(--text2)">Пользователи не найдены</div>';return}
  res.innerHTML=matches.map(u=>{
    const isSelected=grpSelectedUsers.includes(u.username);
    const checkHtml=isSelected?`<div class="user-row-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`:'';
    return`<div class="user-row" onclick="selectUser('${u.username}')">
      ${avHtml(u,'sm')}

        <div class="user-row-name">${esc(u.name)}</div>
        <div class="user-row-un">@${u.username}</div>
      </div>
      ${checkHtml}
    </div>`;
  }).join('');
}

function selectUser(un){
  if(newChatMode==='dm'){
    closeModal('modal-new');
    setTimeout(()=>{
      const chatId=DB.createDM(CU,un);
      openChat(chatId);renderChatList();
    },280);
  }else{
    // toggle selection for group
    if(grpSelectedUsers.includes(un)){
      grpSelectedUsers=grpSelectedUsers.filter(x=>x!==un);
    }else{
      grpSelectedUsers.push(un);
    }
    updateGrpChips();
    // re-render search
    searchUsers(document.getElementById('user-search-inp').value);
  }
}

function updateGrpChips(){
  const chips=document.getElementById('grp-chips');
  chips.innerHTML=grpSelectedUsers.map(un=>{
    const u=DB.getUser(un);
    return u?`<div class="chip">${avHtml(u,'xs')}<span>${esc(u.name.split(' ')[0])}</span><button class="chip-x" onclick="removeGrpUser('${un}')">×</button></div>`:''

}

function createGroup(){

  if(!grpSelectedUsers.length){toast('Выберите хотя бы одного участника');return}
  const members=[CU,...grpSelectedUsers];

  setTimeout(()=>{openChat(chatId);renderChatList()},280);
}

}
function saveProfile(){
  const newName=document.getElementById('sett-name-inp').value.trim();
  if(!newName){toast('Имя не может быть пустым');return}
  DB.updateUser(CU,{name:newName});
  document.getElementById('sett-name').textContent=newName;
  toast('Профиль обновлён ✓');
  renderChatList();
}
function pickAvatar(){document.getElementById('avatar-file').click()}
function onAvatarFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    DB.updateUser(CU,{avatar:dataUrl});
    showSettings(); // refresh
    toast('Фото профиля обновлено ✓');
  };
  reader.readAsDataURL(file);
  input.value='';
}

}

  else{if(CU)DB.setOnline(CU,true)}
});

(function init(){
  seedDemo();
  const sess=DB.getSession();
  if(sess&&DB.getUser(sess)){
    CU=sess;DB.setOnline(CU,true);
    screenStack=['scr-list'];
    renderChatList();
    document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
    document.getElementById('scr-list').classList.remove('hidden');
  }else{
    document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
    document.getElementById('scr-auth').classList.remove('hidden');
    screenStack=['scr-auth'];
  }
})();
